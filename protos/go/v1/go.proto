syntax = "proto3";
package go.v1;

option go_package = "github.com/organic-programming/rob-go/gen/go/go/v1;gov1";

service GoService {

  // ---- Exec mode: orchestration via subprocess ----

  rpc Build(GoCommandRequest) returns (GoCommandResponse);
  rpc Test(TestRequest) returns (TestResponse);
  rpc Run(GoCommandRequest) returns (GoCommandResponse);
  rpc Mod(GoCommandRequest) returns (GoCommandResponse);
  rpc Get(GoCommandRequest) returns (GoCommandResponse);
  rpc Install(GoCommandRequest) returns (GoCommandResponse);
  rpc Generate(GoCommandRequest) returns (GoCommandResponse);
  rpc Clean(GoCommandRequest) returns (GoCommandResponse);
  rpc Work(GoCommandRequest) returns (GoCommandResponse);
  rpc Tool(GoCommandRequest) returns (GoCommandResponse);
  rpc Fix(GoCommandRequest) returns (GoCommandResponse);

  // ---- Library mode: in-process analysis ----

  // Format Go source (go/format — no subprocess).
  rpc Format(FormatRequest) returns (FormatResponse);

  // Parse Go source into AST and return structural info.
  rpc Parse(ParseRequest) returns (ParseResponse);

  // Type-check a package and return diagnostics.
  rpc TypeCheck(TypeCheckRequest) returns (TypeCheckResponse);

  // Run static analysis (go vet + custom analyzers).
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse);

  // Load package metadata and dependency graph.
  rpc LoadPackages(LoadPackagesRequest) returns (LoadPackagesResponse);

  // Extract documentation from Go packages.
  rpc Doc(DocRequest) returns (DocResponse);

  // Print Go environment.
  rpc Env(GoCommandRequest) returns (GoCommandResponse);

  // Print Go version + platform info.
  rpc Version(VersionRequest) returns (VersionResponse);
}

// ---- Exec mode messages ----

message GoCommandRequest {
  repeated string args = 1;
  string workdir = 2;
  repeated string env = 3; // "KEY=VALUE" format
  int32 timeout_s = 4; // 0 = no timeout
}

message GoCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  float elapsed_s = 4;
}

message TestRequest {
  repeated string args = 1; // e.g. ["./...", "-v", "-race"]
  string workdir = 2;
  repeated string env = 3;
  int32 timeout_s = 4;
  bool json_output = 5; // Force -json for structured parsing
  bool cover = 6;
  string cover_profile = 7;
}

message TestResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  float elapsed_s = 4;
  repeated TestEvent events = 5; // From `go test -json`
  int32 total = 6;
  int32 passed = 7;
  int32 failed = 8;
  int32 skipped = 9;
}

message TestEvent {
  string time = 1;
  string action = 2; // run, pass, fail, skip, output, pause, cont
  string package = 3;
  string test = 4;
  float elapsed = 5;
  string output = 6;
}

// ---- Library mode messages ----

message FormatRequest {
  string source = 1; // Go source code text
  string filename = 2; // For error messages
}

message FormatResponse {
  string formatted = 1;
  bool changed = 2; // true if formatting changed the source
  string error = 3;
}

message ParseRequest {
  string source = 1;
  string filename = 2;
  bool with_comments = 3; // Include comments in AST
}

message ParseResponse {
  string package_name = 1;
  repeated string imports = 2;
  repeated Declaration declarations = 3;
  repeated Diagnostic errors = 4;
}

message Declaration {
  string kind = 1; // "func", "type", "var", "const"
  string name = 2;
  string signature = 3; // For funcs: full signature
  string doc = 4; // Doc comment
  int32 line = 5;
  int32 end_line = 6;
  bool exported = 7;
  repeated Declaration children = 8; // Methods, struct fields, etc.
}

message TypeCheckRequest {
  repeated string patterns = 1; // Package patterns (e.g. "./...")
  string workdir = 2;
  repeated string env = 3;
}

message TypeCheckResponse {
  bool ok = 1;
  repeated Diagnostic diagnostics = 2;
  repeated PackageInfo packages = 3;
}

message Diagnostic {
  string file = 1;
  int32 line = 2;
  int32 column = 3;
  string severity = 4; // "error", "warning", "info"
  string message = 5;
  string category = 6; // Analyzer or compiler subsystem
}

message AnalyzeRequest {
  repeated string patterns = 1; // Package patterns
  string workdir = 2;
  repeated string env = 3;
  repeated string analyzers = 4; // Analyzer names (empty = all default vet analyzers)
}

message AnalyzeResponse {
  bool ok = 1;
  repeated Diagnostic diagnostics = 2;
}

message LoadPackagesRequest {
  repeated string patterns = 1;
  string workdir = 2;
  repeated string env = 3;
  bool with_deps = 4; // Load transitive dependencies
}

message LoadPackagesResponse {
  repeated PackageInfo packages = 1;
}

message PackageInfo {
  string id = 1; // Package import path
  string name = 2; // Package name
  string dir = 3; // Directory on disk
  repeated string go_files = 4;
  repeated string imports = 5; // Direct import paths
  repeated Diagnostic errors = 6;
}

message DocRequest {
  string pattern = 1; // Package pattern or symbol
  string workdir = 2;
}

message DocResponse {
  string package_name = 1;
  string package_doc = 2;
  repeated Declaration symbols = 3;
}

message VersionRequest {}

message VersionResponse {
  string version = 1; // e.g. "go1.24.0"
  string goos = 2;
  string goarch = 3;
  string goroot = 4;
}
